<!DOCTYPE html> 
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>失敗した · 無限</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100vh;
            background: #0a0a0a;
            font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Meiryo',
                'Microsoft YaHei', 'PingFang SC', sans-serif;
            overflow-x: hidden;
        }

        /* ===== 主容器 ===== */
        #fail-container {
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            padding: 8px;
            gap: 4px 6px;
            min-height: 100vh;
            width: 100%;
            background: radial-gradient(ellipse at 30% 20%, #1a0505, #0a0a0a 70%);
        }

        /* ===== 每个竖排文字块 ===== */
        .fail-block {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            writing-mode: vertical-rl;
            letter-spacing: 0.04em;
            line-height: 1.2;
            font-weight: 900;
            color: #ff1744;
            text-shadow: 0 0 6px rgba(255, 23, 68, 0.25), 0 0 20px rgba(255, 23, 68, 0.08);
            transition: all 0.25s ease;
            user-select: none;
            -webkit-user-select: none;
            cursor: default;
            flex-shrink: 0;
            will-change: transform, color, text-shadow;
        }

        .fail-block:hover {
            color: #ff6b8a;
            text-shadow:
                0 0 16px rgba(255, 23, 68, 0.7),
                0 0 50px rgba(255, 23, 68, 0.25),
                0 0 90px rgba(255, 23, 68, 0.10);
            transform: scale(1.08) rotate(0deg) !important;
            z-index: 10;
            transition: all 0.15s ease;
        }

        /* ===== 故障闪烁动画（部分块） ===== */
        .fail-block.glitch {
            animation: glitchFlicker 3.2s infinite alternate;
        }
        @keyframes glitchFlicker {
            0% {
                opacity: 0.85;
                text-shadow: 0 0 4px rgba(255, 23, 68, 0.2);
            }
            30% {
                opacity: 1;
                text-shadow: 0 0 12px rgba(255, 23, 68, 0.4), 0 0 30px rgba(255, 0, 0, 0.1);
            }
            70% {
                opacity: 0.92;
                text-shadow: 0 0 8px rgba(255, 23, 68, 0.3);
            }
            100% {
                opacity: 0.7;
                text-shadow: 0 0 2px rgba(255, 23, 68, 0.15);
            }
        }

        /* ===== 滚动条暗色 ===== */
        ::-webkit-scrollbar {
            width: 8px;
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a1a1a;
            border-radius: 4px;
            border: 1px solid #1a0a0a;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #5a2a2a;
        }

        @media (max-width: 600px) {
            #fail-container {
                padding: 4px;
                gap: 2px 4px;
            }
        }
        @media (max-width: 400px) {
            #fail-container {
                padding: 2px;
                gap: 1px 3px;
            }
        }

        /* ===== 加载提示（可选） ===== */
        #loading-marker {
            width: 100%;
            text-align: center;
            color: #3a1a1a;
            font-size: 14px;
            padding: 20px 0;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="fail-container"></div>

    <script>
        (function() {
            'use strict';

            const container = document.getElementById('fail-container');

            // ---------- 工具函数 ----------
            const rand = (min, max) => Math.random() * (max - min) + min;
            const randInt = (min, max) => Math.floor(rand(min, max + 1));

            // ---------- 生成一个带有随机样式的文字块 ----------
            function createFailBlock() {
                const block = document.createElement('div');
                block.className = 'fail-block';
                block.textContent = '失敗した';

                // ---- 随机样式 ----
                let fontSize;
                const r = Math.random();
                if (r < 0.05) {
                    fontSize = rand(50, 72);
                } else if (r < 0.15) {
                    fontSize = rand(14, 22);
                } else {
                    fontSize = rand(22, 48);
                }
                block.style.fontSize = fontSize + 'px';

                const alpha = rand(0.35, 1.0);
                const g = Math.floor(rand(10, 60));
                const b = Math.floor(rand(10, 60));
                block.style.color = `rgba(255, ${g}, ${b}, ${alpha})`;

                const shadowIntensity = alpha * 0.6 + 0.1;
                block.style.textShadow = `
                        0 0 ${rand(4, 18)}px rgba(255, 23, 68, ${shadowIntensity * 0.3}),
                        0 0 ${rand(20, 60)}px rgba(255, 23, 68, ${shadowIntensity * 0.08})
                    `;

                const padX = rand(6, 24);
                const padY = rand(4, 18);
                block.style.padding = `${padY}px ${padX}px`;

                let rotate = rand(-3.5, 3.5);
                if (Math.random() < 0.08) rotate = rand(-6, 6);
                block.style.transform = `rotate(${rotate}deg)`;

                block.style.marginTop = rand(-8, 14) + 'px';
                block.style.marginLeft = rand(-4, 6) + 'px';
                block.style.marginRight = rand(-4, 6) + 'px';

                if (Math.random() < 0.12) {
                    block.classList.add('glitch');
                    block.style.animationDuration = rand(2.2, 5.0) + 's';
                }

                if (Math.random() < 0.02) {
                    block.style.filter = 'blur(0.6px)';
                }
                if (Math.random() < 0.03) {
                    block.style.filter = (block.style.filter || '') + ' brightness(0.7)';
                }

                return block;
            }

            // ---------- 批量生成并追加到容器 ----------
            function appendBlocks(count) {
                const fragment = document.createDocumentFragment();
                for (let i = 0; i < count; i++) {
                    fragment.appendChild(createFailBlock());
                }
                container.appendChild(fragment);
            }

            // ---------- 计算初始需要多少块才能填满视口 ----------
            function getInitialBlockCount() {
                // 估算：每个块平均宽度约 80px，高度约 120px（含间距）
                // 但为保险，直接生成一个测试块测量
                const testBlock = createFailBlock();
                container.appendChild(testBlock);
                const rect = testBlock.getBoundingClientRect();
                const w = rect.width + 10; // 加上间隙
                const h = rect.height + 10;
                testBlock.remove();

                const vw = window.innerWidth;
                const vh = window.innerHeight;
                const cols = Math.ceil(vw / w);
                const rows = Math.ceil(vh / h);
                // 多生成两行保证填满并有余量
                return cols * (rows + 2) + 20;
            }

            // ---------- 状态 ----------
            let isLoading = false; // 防止重复加载
            const BATCH_SIZE = 30; // 每次滚动追加的数量

            // ---------- 滚动监听：无限追加 ----------
            function handleScroll() {
                if (isLoading) return;

                const scrollTop = window.scrollY || window.pageYOffset || 0;
                const clientHeight = window.innerHeight;
                const scrollHeight = document.documentElement.scrollHeight;

                // 当滚动距离底部小于 300px 时触发加载
                if (scrollTop + clientHeight >= scrollHeight - 300) {
                    isLoading = true;
                    // 使用 requestAnimationFrame 避免频繁触发
                    requestAnimationFrame(() => {
                        appendBlocks(BATCH_SIZE);
                        isLoading = false;
                        // 触发后再次检查是否仍需要追加（可能一次追加不够）
                        // 但为了防止无限循环，让下一次滚动事件继续触发
                    });
                }
            }

            // ---------- 防抖 + 节流 ----------
            let ticking = false;
            function onScroll() {
                if (!ticking) {
                    window.requestAnimationFrame(() => {
                        handleScroll();
                        ticking = false;
                    });
                    ticking = true;
                }
            }

            // ---------- 初始化 ----------
            function init() {
                // 清空容器
                container.innerHTML = '';
                // 生成初始块（填满视口并多出一些）
                const initialCount = getInitialBlockCount();
                appendBlocks(initialCount);
                console.log(`💀 初期生成 ${initialCount} 個`);

                // 绑定滚动事件
                window.addEventListener('scroll', onScroll, { passive: true });
                window.addEventListener('resize', () => {
                    // 如果视口变大导致底部空白，可以触发一次加载
                    // 但简单起见，用户滚动时会自动补
                });

                // 键盘 R 重建（保留）
                document.addEventListener('keydown', (e) => {
                    if ((e.key === 'r' || e.key === 'R') && !e.ctrlKey && !e.metaKey) {
                        e.preventDefault();
                        container.innerHTML = '';
                        const count = getInitialBlockCount();
                        appendBlocks(count);
                        console.log(`♻️ 再構築: ${count} 個`);
                        window.scrollTo(0, 0);
                    }
                });

                console.log('📜 無限スクロール — 永遠に「失敗」が続きます');
                console.log('🔄 [R] キーで再生成');
            }

            // 等 DOM 完全加载后执行
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
